name: Flutter Build APK & iOS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Initialize Native App Wrappers
        run: |
          cd flutter_app
          flutter create --org com.edge.scraper --project-name edge_scraper .

      - name: Get Dependencies
        run: |
          cd flutter_app
          flutter pub get

      - name: Build Android Release APK
        run: |
          cd flutter_app
          flutter build apk --release

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: Build iOS (No-Codesign)
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Initialize Native App Wrappers
        run: |
          cd flutter_app
          flutter create --org com.edge.scraper --project-name edge_scraper .

      - name: Get Dependencies
        run: |
          cd flutter_app
          flutter pub get

      - name: Build iOS Release (No-Codesign)
        run: |
          cd flutter_app
          flutter build ios --release --no-codesign

      - name: Compress iOS App Bundle
        run: |
          cd flutter_app/build/ios/iphoneos
          zip -r Runner.app.zip Runner.app

      - name: Upload iOS App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-no-codesign
          path: flutter_app/build/ios/iphoneos/Runner.app.zip
